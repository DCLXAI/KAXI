name: Official Source Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      persist_candidates:
        description: "Create PENDING knowledge candidates when official sources change"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      max_sources:
        description: "Optional per-batch source limit for incident testing"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: official-source-monitor-${{ github.ref }}
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - batch: law-core
            source_ids: immigration-law-recent-promulgations,immigration-law-interpretation-hierarchy,immigration-act-stay-status-scope,immigration-act-general-stay-status,immigration-act-permanent-residence-status,immigration-act-permission-matrix,immigration-law-violation-risk,immigration-decree-current-text,immigration-decree-long-term-status-table,immigration-decree-short-term-status-table,immigration-decree-permanent-residence-table
          - batch: law-visa-entry
            source_ids: immigration-act-visa-passport-requirement,immigration-act-visa-issuance-certificate
          - batch: law-entry-removal
            source_ids: immigration-act-entry-ban,immigration-act-entry-inspection,immigration-act-departure-inspection,immigration-act-departure-suspension,immigration-act-deportation-grounds,immigration-act-detention-order,immigration-act-deportation-objection,immigration-act-deportation-detention,immigration-act-detention-temporary-release,immigration-act-departure-recommendation-order,immigration-act-permit-cancellation-change
          - batch: law-work-permissions
            source_ids: immigration-act-employment-restriction,immigration-act-employer-reporting-duty,immigration-act-student-management-reporting,immigration-act-outside-status-activity,immigration-act-workplace-change-addition,immigration-act-activity-scope-restriction,immigration-act-false-application-documents
          - batch: law-stay-permissions
            source_ids: immigration-act-status-grant,immigration-act-status-change,immigration-act-stay-extension,immigration-act-marriage-immigrant-extension-special,immigration-act-emergency-extension-special
          - batch: law-stay-duties
            source_ids: immigration-act-reentry-permit,immigration-act-alien-registration,immigration-act-registration-change-report,immigration-act-address-change-report,immigration-act-arc-return-duty,immigration-act-biometric-information-duty
          - batch: rule-and-procedure
            source_ids: immigration-rule-stay-permission-review-criteria,immigration-rule-documents-attachments,immigration-rule-fees,hikorea-homepage-urgent-notices,hikorea-integrated-status-manual,hikorea-d2-d4-d10-e7-f2-f5-requirements,hikorea-stay-extension
          - batch: hikorea-news
            source_ids: hikorea-status-change,hikorea-activity-permit,hikorea-forms-document-checklist,hikorea-online-visit-application,hikorea-fees-processing-authentication,hikorea-policy-notice-monitor,moj-immigration-policy-news
          - batch: moj-policy-notices
            source_ids: moj-notice-board-visa-policy,moj-e7-wage-requirement-2026,moj-f6-marriage-visa-criteria,moj-f4-employment-restriction-preannouncement
          - batch: moj-program-pages
            source_ids: moj-skilled-worker-points-visa,moj-seasonal-worker-program,moj-online-stay-visa-center
          - batch: moj-stay-compliance
            source_ids: moj-stay-management-policy,moj-tax-health-arrears-extension-restriction,moj-social-integration-program-kiip
          - batch: moj-entry-procedure
            source_ids: moj-k-eta-entry-authorization,moj-k-eta-scam-warning,moj-e-arrival-card,moj-e-arrival-card-notice
          - batch: moj-office-jurisdiction
            source_ids: moj-office-jurisdiction-seoul-incheon-gyeonggi,moj-office-jurisdiction-busan-gyeongnam,moj-office-jurisdiction-gwangju-jeolla-jeju,moj-office-jurisdiction-daegu-gyeongbuk-gangwon,moj-office-jurisdiction-daejeon-chungcheong,moj-mobile-immigration-office
          - batch: study-visa-portal
            source_ids: study-in-korea-d10-change-documents,accredited-university,visa-portal-visa-types
          - batch: verified-easylaw-student-worker
            source_ids: easylaw-foreign-student-guide,easylaw-foreign-student-part-time-work,easylaw-foreign-worker-employment-guide,easylaw-foreign-worker-status-methods,easylaw-foreign-worker-workplace-change
          - batch: verified-easylaw-family-overseas-korean
            source_ids: easylaw-marriage-immigrant-status,easylaw-marriage-immigrant-reentry,easylaw-marriage-immigrant-official-qna,easylaw-overseas-korean-f4-status,easylaw-overseas-korean-employment
          - batch: verified-court-decisions
            source_ids: scourt-f4-visa-refusal-2017du38874,scourt-f4-second-refusal-2020guhap80547,scourt-stay-extension-departure-order-2017guhap21137,scourt-f6-visa-refusal-2014du42506,scourt-permanent-residence-cancellation-procedure,scourt-f4-refusal-recent-judgment
          - batch: verified-moj-guidance-cases
            source_ids: moj-1345-multilingual-consultation,moj-foreign-resident-legal-support,moj-illegal-delivery-rider-enforcement-2026,moj-overseas-korean-f4-integration-2026,moj-new-immigration-policy-cases-2024
          - batch: verified-consular-ko
            source_ids: mofa-vietnam-student-visa-2026-ko,mofa-hochiminh-student-visa-2026-ko,mofa-japan-student-visa-2026-ko
          - batch: verified-consular-vi-mn
            source_ids: mofa-vietnam-student-visa-vi,mofa-hochiminh-student-visa-vi,mofa-mongolia-visa-process-mn
          - batch: verified-consular-en
            source_ids: mofa-malaysia-d2-visa-2026-en,mofa-finland-d2-visa-2026-en,mofa-singapore-d2-visa-2025-en,mofa-seattle-d2-d4-visa-2026-en,mofa-hong-kong-d2-visa-2026-en
    env:
      KAXI_MONITOR_URL: https://kaxi.vercel.app/api/knowledge/monitor
      KAXI_ADMIN_API_KEY: ${{ secrets.KAXI_ADMIN_API_KEY }}
      PERSIST_CANDIDATES: ${{ inputs.persist_candidates || 'false' }}
      MAX_SOURCES: ${{ inputs.max_sources || '' }}
      SOURCE_IDS: ${{ matrix.source_ids }}
    steps:
      - name: Require monitor admin key
        if: ${{ env.KAXI_ADMIN_API_KEY == '' }}
        run: |
          echo "KAXI_ADMIN_API_KEY secret is required for scheduled official source monitoring."
          exit 1

      - name: Call KAXI official source monitor
        shell: bash
        run: |
          set -euo pipefail

          body="$(jq -n \
            --argjson persist "$PERSIST_CANDIDATES" \
            --arg ids "$SOURCE_IDS" \
            --arg max "$MAX_SOURCES" \
            '{
              persistCandidates: $persist,
              sourceIds: ($ids | split(",") | map(select(length > 0)))
            } + if ($max | length) > 0 then { maxSources: ($max | tonumber) } else {} end')"

          response="$(curl --fail-with-body --silent --show-error --max-time 75 \
            --request POST "$KAXI_MONITOR_URL" \
            --header "authorization: Bearer $KAXI_ADMIN_API_KEY" \
            --header "content-type: application/json" \
            --data "$body")"

          echo "$response" | jq --arg batch "${{ matrix.batch }}" '{
            batch: $batch,
            checkedAt,
            total,
            changed,
            unchanged,
            failed,
            candidatesCreated,
            alert,
            changedDocIds: [.results[] | select(.status == "changed") | .docId],
            failedDocIds: [.results[] | select(.status == "failed") | .docId],
            failedResults: [.results[] | select(.status == "failed") | {docId, error}]
          }'

          failed="$(echo "$response" | jq '.failed')"
          if [ "$failed" -gt 0 ]; then
            echo "Official source monitor detected failed source checks."
            exit 1
          fi
