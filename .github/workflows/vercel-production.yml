name: Vercel Production Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      PRISMA_DATABASE_URL: ${{ secrets.PRISMA_DATABASE_URL }}
      NEXTAUTH_URL: https://kaxi.vercel.app
      NEXTAUTH_URL_INTERNAL: https://kaxi.vercel.app
      KAXI_PRISMA_PROVIDER: postgresql
    steps:
      - name: Require Vercel deployment secrets
        if: ${{ env.VERCEL_TOKEN == '' || env.VERCEL_ORG_ID == '' || env.VERCEL_PROJECT_ID == '' }}
        run: |
          echo "VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID are required for production deployment."
          exit 1
      - name: Require production database secrets
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' && env.DATABASE_URL == '' && env.POSTGRES_URL == '' }}
        run: |
          echo "DATABASE_URL or POSTGRES_URL GitHub secret is required for production migrations."
          exit 1
      - name: Mask production database secrets
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: |
          [ -z "$DATABASE_URL" ] || echo "::add-mask::$DATABASE_URL"
          [ -z "$POSTGRES_URL" ] || echo "::add-mask::$POSTGRES_URL"
          [ -z "$PRISMA_DATABASE_URL" ] || echo "::add-mask::$PRISMA_DATABASE_URL"
      - uses: actions/checkout@v4
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
      - uses: oven-sh/setup-bun@v2
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        with:
          bun-version: latest
      - name: Install dependencies
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: bun install --frozen-lockfile
      - name: Pull Vercel production environment
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: bunx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build with Vercel
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: bunx vercel build --prod --token="$VERCEL_TOKEN"
      - name: Apply PostgreSQL migrations
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: bun run scripts/deploy-postgres-migrations.ts
      - name: Prune deployment model cache
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: bun run scripts/prune-vercel-output.ts
      - name: Inject runtime environment into prebuilt functions
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: bun run scripts/inject-vercel-runtime-env.ts
      - name: Deploy prebuilt output to production
        if: ${{ env.VERCEL_TOKEN != '' && env.VERCEL_ORG_ID != '' && env.VERCEL_PROJECT_ID != '' }}
        run: bunx vercel deploy --prebuilt --archive=tgz --prod --token="$VERCEL_TOKEN"
