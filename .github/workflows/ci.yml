name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:${{ github.workspace }}/db/custom.db
      MODEL_CACHE_DIR: ${{ github.workspace }}/data/model-cache
      VECTOR_CACHE_FILE: ${{ github.workspace }}/data/vector-store/embeddings-cache.json
      RESTORE_MODEL_CACHE_ON_INSTALL: "true"
      RESTORE_SQLITE_DEMO_DB: "false"
      TRANSFORMERS_ALLOW_REMOTE: "false"
      TRANSFORMERS_ALLOW_LOCAL: "true"
      ZAI_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install and restore runtime artifacts
        run: bun install --frozen-lockfile
      - name: Prepare local database from migrations
        run: bun run db:prepare-local && bun run db:seed:schools && bun run db:seed:synonyms && bun run db:seed:rules
      - name: Typecheck profiles
        run: bun run ci:types
      - name: Lint
        run: bun run lint
      - name: Verify domain quality gates
        run: bun run ci:domain
      - name: Verify operations quality gates
        run: bun run ci:ops
      - name: Build
        run: bun run build
