name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: kaxi_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d kaxi_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kaxi_ci?schema=public
      SUPABASE_DIRECT_URL: postgresql://postgres:postgres@localhost:5432/kaxi_ci?schema=public
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/kaxi_test?schema=public
      MODEL_CACHE_DIR: ${{ github.workspace }}/data/model-cache
      VECTOR_CACHE_FILE: ${{ github.workspace }}/data/vector-store/embeddings-cache.json
      RESTORE_MODEL_CACHE_ON_INSTALL: "true"
      TRANSFORMERS_ALLOW_REMOTE: "false"
      TRANSFORMERS_ALLOW_LOCAL: "true"
      AI_PROVIDER: "kimi"
      OPENAI_API_KEY: ""
      OPENAI_BASE_URL: "https://api.moonshot.ai/v1"
      OPENAI_MODEL: "kimi-k2.6"
      ANTHROPIC_API_KEY: ""
      ANTHROPIC_MODEL: "claude-opus-4-8"
      AI_ALLOW_LLM_FALLBACK: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - name: Install and restore runtime artifacts
        run: bun install --frozen-lockfile
      - name: Create isolated test database
        run: psql "postgresql://postgres:postgres@localhost:5432/postgres" -c "CREATE DATABASE kaxi_test;"
      - name: Prepare Supabase-compatible Postgres database
        run: bun run db:migrate:deploy && bun run db:seed:schools && bun run db:seed:synonyms && bun run db:seed:rules && bun run knowledge:pgvector
      - name: Typecheck profiles
        run: bun run ci:types
      - name: Lint
        run: bun run lint
      - name: Verify domain quality gates
        run: bun run ci:domain
      - name: Verify operations quality gates
        run: bun run ci:ops
      - name: Build
        run: bun run build
