name: Chat Attachment Worker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chat-attachment-worker
  cancel-in-progress: false

jobs:
  drain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      KAXI_ADMIN_API_KEY: ${{ secrets.KAXI_ADMIN_API_KEY }}
    steps:
      - name: Require worker admin key
        if: ${{ env.KAXI_ADMIN_API_KEY == '' }}
        run: |
          echo "KAXI_ADMIN_API_KEY is required for the attachment worker."
          exit 1
      - name: Drain attachment queue
        run: |
          curl --fail-with-body --silent --show-error --max-time 70 \
            --request POST https://kaxi.vercel.app/api/internal/chat-attachments/process \
            --header "authorization: Bearer $KAXI_ADMIN_API_KEY" \
            --header "content-type: application/json" \
            --data '{"limit":10}'
